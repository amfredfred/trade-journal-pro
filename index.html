    <!-- 3. FAQPage — pulls directly from your FAQ component content -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What brokers are supported?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Bobi's Quote connects to any MT4 or MT5 account via MetaAPI. This covers the vast majority of retail forex brokers worldwide — including IC Markets, Pepperstone, FTMO, and most prop firms."
          }
        },
        {
          "@type": "Question",
          "name": "How is Bobi's Quote different from a copy-trading service?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A copy-trading service blindly mirrors someone else's trades. Bobi's Quote detects setups using deterministic technical rules — Break of Structure, zone formation, rejection candle scoring — based on what price is doing right now on your data feed. You own the logic."
          }
        },
        {
          "@type": "Question",
          "name": "What do the backtest results prove?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The walk-forward simulation ran across 10 liquid pairs over 10 months, producing 1,484 trades using the exact same rules the live engine applies — session filters, dedup rules, R:R gates, breakeven logic. +1,111.45R at a profit factor of 2.84 with a max drawdown of −7.75R."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use Bobi's Quote without auto-trade enabled?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The signal feed, zone map, trade journal, and analytics work fully without a connected broker. Many users monitor signals manually and enter trades themselves. Auto-trade is optional and can be enabled at any time."
          }
        },
        {
          "@type": "Question",
          "name": "Is it suitable for prop or funded accounts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Elite plan includes funded account mode with configurable daily drawdown limits and loss-guard circuit breakers that automatically suspend trading if thresholds are breached — designed to comply with standard prop firm risk rules."
          }
        },
        {
          "@type": "Question",
          "name": "What timeframe pairs does the signal engine use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The default runs 30M/5M and 1H/5M in parallel. Each pair runs an independent pipeline and emits signals tagged with its timeframe."
          }
        },
        {
          "@type": "Question",
          "name": "How is billing handled?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Subscriptions are managed through RevenueCat with payments via Stripe. Subscribe, upgrade, downgrade, or cancel at any time. No contracts. A free tier lets you explore signals and zones before connecting any broker."
          }
        },
        {
          "@type": "Question",
          "name": "What happens if my internet connection drops?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The signal engine runs server-side, not on your device. Open positions managed by auto-trade continue to be tracked and managed regardless of your connection status. Push notifications fire when TP1, TP2, or SL is hit."
          }
        }
      ]
    }
    </script>
